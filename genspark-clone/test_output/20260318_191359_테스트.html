<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테스트 - Genspark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        header { border-bottom: 2px solid #007bff; margin-bottom: 30px; padding-bottom: 20px; }
        h1 { font-size: 2em; margin-bottom: 10px; color: #0056b3; }
        h2 { font-size: 1.5em; margin-top: 30px; margin-bottom: 10px; color: #0056b3; border-left: 4px solid #007bff; padding-left: 10px; }
        h3 { font-size: 1.2em; margin-top: 20px; margin-bottom: 8px; }
        p { margin-bottom: 15px; }
        ul { margin: 10px 0 15px 30px; }
        li { margin-bottom: 8px; }
        strong { font-weight: bold; }
        .meta { font-size: 0.9em; color: #666; margin-bottom: 15px; }
        .meta-item { display: inline-block; margin-right: 20px; }
        .meta-label { font-weight: bold; color: #333; }
        aside { background: #f8f9fa; border-left: 3px solid #007bff; padding: 15px; margin-top: 40px; }
        aside h3 { margin-top: 0; }
        aside a { color: #007bff; text-decoration: none; word-break: break-all; }
        aside a:hover { text-decoration: underline; }

        /* v2.0 Widget Styles */
        
/* Widget Styles */
.widget-table {
    width: 100%;
    border-collapse: collapse;
    margin: 15px 0;
    border: 1px solid #ddd;
}

.widget-table tr {
    border-bottom: 1px solid #ddd;
}

.widget-table td {
    padding: 10px;
    text-align: left;
}

.widget-table tr:nth-child(even) {
    background: #f8f9fa;
}

.widget-list {
    list-style: disc;
    margin: 15px 0 15px 30px;
    padding: 0;
}

.widget-list li {
    margin-bottom: 8px;
}

.widget-timeline {
    margin: 20px 0;
    position: relative;
}

.timeline-item {
    display: flex;
    margin-bottom: 20px;
    padding-left: 30px;
    position: relative;
}

.timeline-marker {
    width: 12px;
    height: 12px;
    background: #007bff;
    border-radius: 50%;
    position: absolute;
    left: 0;
    top: 5px;
}

.timeline-content {
    flex: 1;
}

.widget-quote {
    border-left: 4px solid #007bff;
    padding-left: 15px;
    margin: 15px 0;
    font-style: italic;
    color: #555;
}

.widget-quote p {
    margin: 10px 0;
}

.widget-factbox {
    background: #f8f9fa;
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 15px;
    margin: 15px 0;
}

.fact-item {
    display: flex;
    margin-bottom: 10px;
}

.fact-number {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    background: #007bff;
    color: white;
    border-radius: 50%;
    margin-right: 10px;
    font-size: 12px;
    font-weight: bold;
    flex-shrink: 0;
}

.fact-text {
    flex: 1;
}

.widget-text p {
    margin-bottom: 15px;
    line-height: 1.6;
}

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>테스트</h1>
            <div class="meta">
                <span class="meta-item"><span class="meta-label">신뢰도:</span> 90%</span>
                <span class="meta-item"><span class="meta-label">소스:</span> 1개</span>
                <span class="meta-item"><span class="meta-label">생성:</span> 2026-03-18 19:13:59</span>
            </div>
        </header>
        <main>
            <h1>테스트</h1>

<p>**생성일시**: 2026-03-18 19:13:59</p>
<p>**신뢰도**: 90%</p>
<p>**소스**: 1개</p>

<h2>핵심 사실</h2>
<ul>
<li>사실 1</li>
</ul>

<h2>개요</h2>
<p>이것은 테스트입니다.</p>

<strong>출처:</strong>
<ul>
<li>https://example.com</li>
</ul>

        </main>
        <aside>
            <h3>ℹ️ 이 Sparkpage는 AI가 자동 생성했습니다</h3>
            <p>Genspark Clone v2.0으로 생성된 종합 정보 페이지입니다. 다양한 관점의 정보 수집과 위젯 기반 시각화를 포함합니다.</p>
        </aside>
    </div>
</body>
</html>
